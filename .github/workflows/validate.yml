name: Validate npm build

on:
  workflow_dispatch:
  push:
    branches:
      - fix/npm-and-lovable-cleanup
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Generate npm lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Upload npm lockfile
        uses: actions/upload-artifact@v4
        with:
          name: npm-lockfile
          path: package-lock.json
          if-no-files-found: error
          retention-days: 1

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 1

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
