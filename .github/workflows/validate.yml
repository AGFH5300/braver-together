name: Validate npm build

on:
  workflow_dispatch:
  push:
    branches:
      - fix/npm-and-lovable-cleanup
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Normalize onboarding upsert typing
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/lib/advisor-application.functions.ts")
          content = path.read_text()
          old = '''  const payload = completed
            ? { user_id: userId, completed_at: new Date().toISOString() }
            : { user_id: userId };'''
          new = '''  const payload = {
            user_id: userId,
            completed_at: completed ? new Date().toISOString() : null,
          };'''
          if old not in content:
              raise SystemExit("Expected onboarding payload block was not found")
          path.write_text(content.replace(old, new, 1))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/advisor-application.functions.ts
          git commit -m "Normalize advisor onboarding upsert payload"
          git push origin "HEAD:${GITHUB_HEAD_REF}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Generate npm lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Upload npm lockfile
        uses: actions/upload-artifact@v4
        with:
          name: npm-lockfile
          path: package-lock.json
          if-no-files-found: error
          retention-days: 1

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Type-check
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: advisor-cv-typecheck
          path: typecheck.log
          if-no-files-found: error
          retention-days: 1

      - name: Lint
        run: npm run lint
