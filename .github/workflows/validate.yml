          replace(
              server,
              'throw new Error(signedError?.message || "A secure CV upload slot could not be created.");',
              'throw new Error(signedError?.message || "The CV upload could not be started.");',
          )
          replace(
              server,
              '''    if (data.decision === "approved") {
              const { error: profileError } = await supabaseAdmin
                .from("profiles")
                .update({
                  is_advisor: true,
                  is_public: false,
                  accepting_messages: true,
                  availability_status: "offline",
                })
                .eq("id", application.user_id);
              if (profileError) throw new Error(profileError.message);

              const { error: roleError } = await supabaseAdmin
                .from("user_roles")
                .upsert({ user_id: application.user_id, role: "advisor" }, { onConflict: "user_id,role" });
              if (roleError) throw new Error(roleError.message);
            }

            await supabaseAdmin.from("advisor_application_events").insert({''',
              '''    if (data.decision === "approved") {
              const { error: profileError } = await supabaseAdmin
                .from("profiles")
                .update({
                  is_advisor: true,
                  is_public: false,
                  accepting_messages: true,
                  availability_status: "offline",
                })
                .eq("id", application.user_id);
              if (profileError) throw new Error(profileError.message);

              const { error: roleError } = await supabaseAdmin
                .from("user_roles")
                .upsert({ user_id: application.user_id, role: "advisor" }, { onConflict: "user_id,role" });
              if (roleError) throw new Error(roleError.message);
            }

            const { error: onboardingError } = await supabaseAdmin
              .from("advisor_onboarding_intents")
              .upsert({
                user_id: application.user_id,
                completed_at: data.decision === "approved" ? now : null,
              }, { onConflict: "user_id" });
            if (onboardingError) throw new Error(onboardingError.message);

            await supabaseAdmin.from("advisor_application_events").insert({''',
          )

          application = "src/routes/_authenticated/advisor-application.tsx"
          replace(
              application,
              '<Field label="Professional or university profile" type="url" placeholder="https://…" value={form.profileUrl} onChange={(value) => setForm((current) => ({ ...current, profileUrl: value }))} maxLength={500} />',
              '<Field label="Professional or university profile" placeholder="example.com or https://example.com" value={form.profileUrl} onChange={(value) => setForm((current) => ({ ...current, profileUrl: value }))} maxLength={500} />',
          )
          replace(
              application,
              '''                  <div className="text-sm font-semibold">CV or résumé</div>
                      <div className="mt-1 text-xs text-muted-foreground">Required · PDF or DOCX · maximum 5 MB</div>''',
              '''                  <div className="text-sm font-semibold">CV or résumé <span className="text-danger" aria-hidden="true">*</span><span className="sr-only"> required</span></div>
                      <div className="mt-1 text-xs text-muted-foreground">PDF or DOCX · maximum 5 MB</div>''',
          )
          replace(
              application,
              '{formatBytes(file.size)} · Ready for secure verification',
              '{formatBytes(file.size)} · Ready to upload',
          )
          replace(
              application,
              '''function stageLabel(stage: UploadStage, existing: boolean): string {
            if (stage === "hashing") return "Checking CV integrity…";
            if (stage === "preparing") return "Creating secure upload…";
            if (stage === "uploading") return "Uploading CV…";
            if (stage === "verifying") return "Verifying CV…";
            if (stage === "submitting") return "Submitting application…";
            return existing ? "Resubmit application" : "Submit application";
          }''',
              '''function stageLabel(stage: UploadStage, existing: boolean): string {
            if (stage === "hashing") return "Preparing file…";
            if (stage === "preparing") return "Starting upload…";
            if (stage === "uploading") return "Uploading CV…";
            if (stage === "verifying") return "Checking file…";
            if (stage === "submitting") return "Submitting application…";
            return existing ? "Resubmit application" : "Submit application";
          }''',
          )
          replace(
              application,
              'pending: { icon: Clock3, title: "Application under review", description: "Your application and verified CV have been received. You can continue using BraverTogether while the team reviews them.", className: "border-warn/30 bg-warn/5 text-warn" },',
              'pending: { icon: Clock3, title: "Application under review", description: "Your application and CV have been received. We will update this page after the review.", className: "border-warn/30 bg-warn/5 text-warn" },',
          )
          replace(
              application,
              '''  const className = "mt-2 w-full rounded-xl border border-border bg-background px-4 py-3 text-sm font-normal outline-none focus:ring-2 focus:ring-teal/35";
            return <label className="block text-sm font-semibold">{label}{textarea ? <textarea value={value} onChange={(event) => onChange(event.target.value)} placeholder={placeholder} required={required} minLength={minLength} maxLength={maxLength} className={cn(className, minHeight, "resize-y leading-relaxed")} /> : <input type={type} value={value} onChange={(event) => onChange(event.target.value)} placeholder={placeholder} required={required} minLength={minLength} maxLength={maxLength} className={className} />}</label>;''',
              '''  const className = "mt-2 w-full rounded-xl border border-border bg-background px-4 py-3 text-sm font-normal outline-none focus:ring-2 focus:ring-teal/35";
            return (
              <label className="block text-sm font-semibold">
                <span>{label}{required && <><span className="ml-1 text-danger" aria-hidden="true">*</span><span className="sr-only"> required</span></>}</span>
                {textarea
                  ? <textarea value={value} onChange={(event) => onChange(event.target.value)} placeholder={placeholder} required={required} minLength={minLength} maxLength={maxLength} className={cn(className, minHeight, "resize-y leading-relaxed")} />
                  : <input type={type} value={value} onChange={(event) => onChange(event.target.value)} placeholder={placeholder} required={required} minLength={minLength} maxLength={maxLength} autoCapitalize="none" spellCheck={type !== "email"} className={className} />}
              </label>
            );''',
          )

          layout = "src/components/SiteLayout.tsx"
          replace(
              layout,
              '''] as const;

          function BrandMark''',
              '''] as const;

          type OnboardingGateState = {
            required: boolean;
            applicationStatus: "draft" | "pending" | "more_info" | "approved" | "denied" | null;
          };

          const onboardingGateCache = new Map<string, OnboardingGateState>();

          function BrandMark''',
          )
          old_auth_controls = '''function AuthControls({ onNavigate }: { onNavigate?: () => void }) {
            const { user, loading, signOut } = useAuth();
            const getOnboardingGate = useServerFn(getAdvisorOnboardingGate);
            const navigate = useNavigate();
            const [gateLoading, setGateLoading] = useState(false);
            const [applicationRequired, setApplicationRequired] = useState(false);

            useEffect(() => {
              let active = true;

              async function refreshGate() {
                if (!user) {
                  if (active) {
                    setApplicationRequired(false);
                    setGateLoading(false);
                  }
                  return;
                }
                setGateLoading(true);
                try {
                  const gate = await getOnboardingGate();
                  if (active) setApplicationRequired(gate.required);
                } catch {
                  if (active) setApplicationRequired(false);
                } finally {
                  if (active) setGateLoading(false);
                }
              }

              void refreshGate();
              const listener = () => void refreshGate();
              window.addEventListener("advisor-onboarding-changed", listener);
              return () => {
                active = false;
                window.removeEventListener("advisor-onboarding-changed", listener);
              };
            }, [user]);

            async function handleSignOut() {
              await signOut();
              onNavigate?.();
              await navigate({ to: "/" });
            }

            if (loading || gateLoading) return <div className="h-8 w-20 animate-pulse rounded-full bg-secondary" aria-hidden="true" />;

            if (!user) {
              return (
                <div className="flex shrink-0 items-center gap-2">
                  <Link to="/advisor-signup" onClick={onNavigate} className="inline-flex whitespace-nowrap items-center gap-1.5 rounded-full border border-teal/30 bg-teal/5 px-3 py-2 text-xs font-semibold text-teal transition hover:bg-teal/10">
                    <UserRoundPlus className="h-3.5 w-3.5" /> Become an Advisor
                  </Link>
                  <Link to="/auth" onClick={onNavigate} className="inline-flex whitespace-nowrap items-center gap-1.5 rounded-full bg-navy px-4 py-2 text-xs font-semibold text-white shadow-sm transition hover:opacity-90">
                    <LogIn className="h-3.5 w-3.5" /> Sign in
                  </Link>
                </div>
              );
            }

            if (applicationRequired) {
              return (
                <div className="flex shrink-0 items-center gap-1.5">
                  <Link to="/advisor-application" onClick={onNavigate} className="inline-flex whitespace-nowrap items-center gap-1.5 rounded-full bg-teal px-4 py-2 text-xs font-semibold text-white shadow-sm">
                    <UserRoundPlus className="h-3.5 w-3.5" /> Complete application
                  </Link>
                  <button onClick={handleSignOut} title="Sign out" aria-label="Sign out" className="rounded-md p-2 hover:bg-secondary">
                    <LogOut className="h-4 w-4" />
                  </button>
                </div>
              );
            }

            return (
              <div className="flex shrink-0 items-center gap-1">
                <Link to="/advisor-application" onClick={onNavigate} title="Advisor application" aria-label="Advisor application" className="rounded-md p-2 hover:bg-secondary"><UserRoundPlus className="h-4 w-4" /></Link>
                <Link to="/messages" search={{ c: undefined }} onClick={onNavigate} title="Messages" aria-label="Messages" className="rounded-md p-2 hover:bg-secondary"><MessageCircle className="h-4 w-4" /></Link>
                <Link to="/meetings" onClick={onNavigate} title="Meetings" aria-label="Meetings" className="rounded-md p-2 hover:bg-secondary"><CalendarDays className="h-4 w-4" /></Link>
                <Link to="/profile" onClick={onNavigate} title="Profile" aria-label="Profile" className="rounded-md p-2 hover:bg-secondary"><UserIcon className="h-4 w-4" /></Link>
                <button onClick={handleSignOut} title="Sign out" aria-label="Sign out" className="rounded-md p-2 hover:bg-secondary">
                  <LogOut className="h-4 w-4" />
                </button>
              </div>
            );
          }'''
          new_auth_controls = '''function AuthControls({ onNavigate }: { onNavigate?: () => void }) {
            const { user, loading, signOut } = useAuth();
            const getOnboardingGate = useServerFn(getAdvisorOnboardingGate);
            const navigate = useNavigate();
            const [gate, setGate] = useState<OnboardingGateState | null>(() => user ? onboardingGateCache.get(user.id) ?? null : null);
            const [gateLoading, setGateLoading] = useState(() => Boolean(user && !onboardingGateCache.has(user.id)));

            useEffect(() => {
              let active = true;
              const userId = user?.id;

              async function refreshGate(showLoading: boolean) {
                if (!userId) {
                  if (active) {
                    setGate(null);
                    setGateLoading(false);
                  }
                  return;
                }

                if (showLoading) setGateLoading(true);
                try {
                  const result = await getOnboardingGate();
                  const next: OnboardingGateState = {
                    required: result.required,
                    applicationStatus: result.applicationStatus as OnboardingGateState["applicationStatus"],
                  };
                  onboardingGateCache.set(userId, next);
                  if (active) setGate(next);
                } finally {
                  if (active) setGateLoading(false);
                }
              }

              if (!userId) {
                setGate(null);
                setGateLoading(false);
              } else {
                const cached = onboardingGateCache.get(userId);
                if (cached) {
                  setGate(cached);
                  setGateLoading(false);
                } else {
                  void refreshGate(true);
                }
              }

              const listener = () => {
                if (!userId) return;
                onboardingGateCache.delete(userId);
                void refreshGate(false);
              };
              window.addEventListener("advisor-onboarding-changed", listener);
              return () => {
                active = false;
                window.removeEventListener("advisor-onboarding-changed", listener);
              };
            }, [user?.id]);

            async function handleSignOut() {
              if (user) onboardingGateCache.delete(user.id);
              await signOut();
              onNavigate?.();
              await navigate({ to: "/" });
            }

            if (loading || (user && gateLoading && !gate)) return <div className="h-8 w-20 animate-pulse rounded-full bg-secondary" aria-hidden="true" />;

            if (!user) {
              return (
                <div className="flex shrink-0 items-center gap-2">
                  <Link to="/advisor-signup" onClick={onNavigate} className="inline-flex whitespace-nowrap items-center gap-1.5 rounded-full border border-teal/30 bg-teal/5 px-3 py-2 text-xs font-semibold text-teal transition hover:bg-teal/10">
                    <UserRoundPlus className="h-3.5 w-3.5" /> Become an Advisor
                  </Link>
                  <Link to="/auth" onClick={onNavigate} className="inline-flex whitespace-nowrap items-center gap-1.5 rounded-full bg-navy px-4 py-2 text-xs font-semibold text-white shadow-sm transition hover:opacity-90">
                    <LogIn className="h-3.5 w-3.5" /> Sign in
                  </Link>
                </div>
              );
            }

            if (gate?.required) {
              const applicationLabel = gate.applicationStatus === "pending"
                ? "Application under review"
                : gate.applicationStatus === "more_info"
                  ? "Update application"
                  : gate.applicationStatus === "denied"
                    ? "Review application"
                    : "Complete application";

              return (
                <div className="flex shrink-0 items-center gap-1.5">
                  <Link to="/advisor-application" onClick={onNavigate} className="inline-flex whitespace-nowrap items-center gap-1.5 rounded-full bg-teal px-4 py-2 text-xs font-semibold text-white shadow-sm">
                    <UserRoundPlus className="h-3.5 w-3.5" /> {applicationLabel}
                  </Link>
                  <button onClick={handleSignOut} title="Sign out" aria-label="Sign out" className="rounded-md p-2 hover:bg-secondary">
                    <LogOut className="h-4 w-4" />
                  </button>
                </div>
              );
            }

            return (
              <div className="flex shrink-0 items-center gap-1">
                <Link to="/advisor-application" onClick={onNavigate} title="Advisor application" aria-label="Advisor application" className="rounded-md p-2 hover:bg-secondary"><UserRoundPlus className="h-4 w-4" /></Link>
                <Link to="/messages" search={{ c: undefined }} onClick={onNavigate} title="Messages" aria-label="Messages" className="rounded-md p-2 hover:bg-secondary"><MessageCircle className="h-4 w-4" /></Link>
                <Link to="/meetings" onClick={onNavigate} title="Meetings" aria-label="Meetings" className="rounded-md p-2 hover:bg-secondary"><CalendarDays className="h-4 w-4" /></Link>
                <Link to="/profile" onClick={onNavigate} title="Profile" aria-label="Profile" className="rounded-md p-2 hover:bg-secondary"><UserIcon className="h-4 w-4" /></Link>
                <button onClick={handleSignOut} title="Sign out" aria-label="Sign out" className="rounded-md p-2 hover:bg-secondary">
                  <LogOut className="h-4 w-4" />
                </button>
              </div>
            );
          }'''
          replace(layout, old_auth_controls, new_auth_controls)

          Path("src/hooks/use-auth.ts").write_text('''import { useEffect, useState } from "react";
          import type { User } from "@supabase/supabase-js";
          import { supabase } from "@/integrations/supabase/client";

          let cachedUser: User | null | undefined;
          let pendingUserRequest: Promise<User | null> | null = null;

          function loadCurrentUser(): Promise<User | null> {
            if (cachedUser !== undefined) return Promise.resolve(cachedUser);
            if (!pendingUserRequest) {
              pendingUserRequest = supabase.auth.getUser().then(({ data }) => {
                cachedUser = data.user ?? null;
                return cachedUser;
              });
            }
            return pendingUserRequest;
          }

          export function useAuth() {
            const [user, setUser] = useState<User | null>(cachedUser ?? null);
            const [loading, setLoading] = useState(cachedUser === undefined);

            useEffect(() => {
              let mounted = true;

              void loadCurrentUser().then((nextUser) => {
                if (!mounted) return;
                setUser(nextUser);
                setLoading(false);
              });

              const { data: sub } = supabase.auth.onAuthStateChange((_event, session) => {
                const nextUser = session?.user ?? null;
                cachedUser = nextUser;
                pendingUserRequest = Promise.resolve(nextUser);
                if (!mounted) return;
                setUser(nextUser);
                setLoading(false);
              });

              return () => {
                mounted = false;
                sub.subscription.unsubscribe();
              };
            }, []);

            return { user, loading, signOut: () => supabase.auth.signOut() };
          }
          ''')

          auth = "src/routes/auth.tsx"
          replace(
              auth,
              ': advisorIntent ? "Sign in and continue application" : "Sign in securely"',
              ': advisorIntent ? "Sign in and continue application" : "Sign in"',
          )

          docs = "docs/PRE_RENDER_PRODUCTION_TEST_CHECKLIST.md"
          replace(
              docs,
              '''Use email addresses controlled by the team and a password manager.

          ## 4. Public navigation and layout''',
              '''Use email addresses controlled by the team and a password manager.

          Create the Administrator account as an ordinary account first. Then, in Supabase SQL Editor, replace the email below and run:

          ```sql
          insert into public.user_roles (user_id, role)
          select id, 'admin'::public.app_role
          from auth.users
          where lower(email) = lower('admin@example.com')
          on conflict (user_id, role) do nothing;
          ```

          Sign out and back in after assigning the role. Keep the administrator account separate from student and advisor-applicant accounts.

          ## 4. Public navigation and layout''',
          )
          replace(
              docs,
              '''- confirm pending status after success
          - download the current CV and compare it with the original''',
              '''- confirm pending status after success
          - confirm account controls show `Application under review` and sign out only
          - manually open `/messages`, `/meetings`, `/profile`, `/essay-submission`, `/admin-advisors` and `/admin-competitions`
          - confirm every protected route redirects back to `/advisor-application` until approval
          - download the current CV and compare it with the original''',
          )
          replace(
              docs,
              '- advisor applicant forced-onboarding works',
              '- advisor applicants remain gated through draft, pending, more-information and denied states until approval',
          )
          PY

          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/lib/advisor-application.functions.ts src/routes/_authenticated/advisor-application.tsx src/components/SiteLayout.tsx src/hooks/use-auth.ts src/routes/auth.tsx docs/PRE_RENDER_PRODUCTION_TEST_CHECKLIST.md
            git commit -m "Keep advisor applicants gated until approval"
            git push origin "HEAD:${GITHUB_HEAD_REF}"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Generate npm lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Upload npm lockfile
        uses: actions/upload-artifact@v4
        with:
          name: npm-lockfile
          path: package-lock.json
          if-no-files-found: error
          retention-days: 1

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint
